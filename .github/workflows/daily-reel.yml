name: Daily Avaure Trial Reel

on:
  workflow_dispatch:   # MANUAL ONLY — runs only when you click "Run workflow"

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Get the files
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Post today's reel
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          # Built-in run number auto-increments every run, so the bot rotates to
          # the next video each time with no need to save a counter back to the repo.
          POST_INDEX: ${{ github.run_number }}
        run: python3 post_reel.py
